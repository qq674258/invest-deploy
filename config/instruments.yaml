# InstrumentProfile 草案 — 各标的行情、指标、采集、定投配置
# 权重详见 scoring_weights.yaml

defaults:
  scoring:
    s_mid: 50
    lookback_years: 5
    # 综合分上调（0–100 封顶），使高位估值期更接近「谨慎」体感；与 DCA 共用
    cautious_bias: 6
  dca:
    inherit: dca_defaults.yaml

instruments:
  # ─── P0 纳斯达克100 ───────────────────────────────
  - instrument_id: NDX
    display_name: 纳斯达克100
    asset_class: index_us
    priority: P0
    enabled: true
    benchmark_id: null
    calendar_id: US_NYSE
    scoring:
      enabled: true
    ohlcv:
      provider: yfinance
      symbol: "QQQ"
      note: 也可用 ^NDX，QQQ 流动性更好
    scoring_weight_profile: ndx
    metrics:
      valuation: [pe_ttm, shiller_cape, erp_spread, pb, forward_pe_12m]
      sentiment: [vix, cnn_fear_greed, put_call_ratio]
      drawdown: [drawdown_6m_high]
      breadth: [ndx_pct_above_ma200]
      macro: [us10y, yield_curve_2s10s, fed_funds, dxy, fed_balance_sheet]
      trend: [price_vs_ma200, ma50_ma200_cross]
    macro_series:
      pe_ttm: macro:ndx:pe_ttm
      shiller_cape: macro:ndx:shiller_cape
      pb: macro:ndx:pb
      forward_pe_12m: macro:ndx:forward_pe
      vix: macro:ndx:vix
      cnn_fear_greed: macro:ndx:cnn_fear_greed
      put_call_ratio: macro:ndx:put_call
      ndx_pct_above_ma200: macro:ndx:breadth_ma200
      us10y: macro:ndx:us10y
      yield_curve_2s10s: macro:ndx:yield_curve_2s10s
      fed_funds: macro:ndx:fed_funds
      earnings_yield: macro:ndx:earnings_yield
      dxy: macro:ndx:dxy
      fed_balance_sheet: macro:ndx:fed_balance_sheet
      cpi: macro:ndx:cpi
      pce: macro:ndx:pce
    valuation:
      mvp_mode: isolated_ndx
      note: 数据序列均为 macro:ndx:*，与 SPX/基金隔离，见 docs/DATA_ISOLATION.md
    crawl:
      job: crawl_ndx
      schedule: "0 7 * * 1-5"
      timezone: Asia/Shanghai
      retry: 3
      retry_interval_min: 20
      accept_status: [official]
    dca:
      enabled: true
      default_planned_amount: 500
      default_frequency: WEEKLY
      default_multiplier_max: 1.5

  # ─── P0 标普500 ───────────────────────────────────
  - instrument_id: SPX
    display_name: 标普500
    asset_class: index_us
    priority: P0
    enabled: true
    calendar_id: US_NYSE
    scoring:
      enabled: true
    ohlcv:
      provider: yfinance
      symbol: "^GSPC"
    scoring_weight_profile: spx
    metrics:
      valuation: [pe_ttm, shiller_cape, erp_spread, pb, forward_pe_12m]
      sentiment: [vix, cnn_fear_greed, put_call_ratio]
      drawdown: [drawdown_6m_high]
      breadth: [spx_pct_above_ma200]
      macro: [us10y, yield_curve_2s10s, fed_funds, dxy, fed_balance_sheet]
      trend: [price_vs_ma200, ma50_ma200_cross]
    macro_series:
      pe_ttm: macro:spx:pe_ttm
      shiller_cape: macro:spx:shiller_cape
      pb: macro:spx:pb
      forward_pe_12m: macro:spx:forward_pe
      vix: macro:spx:vix
      cnn_fear_greed: macro:spx:cnn_fear_greed
      put_call_ratio: macro:spx:put_call
      spx_pct_above_ma200: macro:spx:breadth_ma200
      us10y: macro:spx:us10y
      yield_curve_2s10s: macro:spx:yield_curve_2s10s
      fed_funds: macro:spx:fed_funds
      earnings_yield: macro:spx:earnings_yield
      dxy: macro:spx:dxy
      fed_balance_sheet: macro:spx:fed_balance_sheet
      cpi: macro:spx:cpi
      pce: macro:spx:pce
    valuation:
      mvp_mode: isolated_spx
      note: 数据序列均为 macro:spx:*，与 NDX/基金隔离
    crawl:
      job: crawl_spx
      schedule: "15 7 * * 1-5"
    dca:
      enabled: true
      default_planned_amount: 500
      default_frequency: MONTHLY
      default_multiplier_max: 1.5

  # ─── P1 日经225 ───────────────────────────────────
  - instrument_id: N225
    display_name: 日经225
    asset_class: index_jp
    priority: P1
    enabled: true
    calendar_id: JP_TSE
    ohlcv:
      provider: yfinance
      symbol: "^N225"
    metrics:
      trend: [ma50, ma200, price_vs_ma200]
      momentum: [rsi14, mom_12_1]
      vol: [realized_vol_20d, atr_pct, drawdown_52w]
      valuation: [price_percentile_5y]
      macro: [usdjpy, us10y]
    crawl:
      job: crawl_jp_de
      schedule: "30 7 * * 1-5"
    dca:
      enabled: true
      default_planned_amount: 300
      default_frequency: MONTHLY
      default_multiplier_max: 2.0

  # ─── P1 德国DAX ───────────────────────────────────
  - instrument_id: DAX
    display_name: 德国DAX
    asset_class: index_de
    priority: P1
    enabled: true
    calendar_id: DE_XETRA
    ohlcv:
      provider: yfinance
      symbol: "^GDAXI"
    metrics:
      trend: [ma50, ma200, price_vs_ma200]
      momentum: [rsi14, mom_12_1]
      vol: [vdax, atr_pct, drawdown_52w]
      valuation: [price_percentile_5y]
      macro: [eurusd, us10y]
    vol_fallback:
      vdax_unavailable: atr_pct
    crawl:
      job: crawl_jp_de
      schedule: "30 7 * * 1-5"
    dca:
      enabled: true
      default_planned_amount: 300
      default_frequency: MONTHLY
      default_multiplier_max: 1.5

# 资产类模板（未在单标的覆盖时使用）
asset_class_templates:
  index_us:
    dimension_weights_profile: nasdaq
  index_jp:
    dimension_weights_profile: nikkei
  index_de:
    dimension_weights_profile: dax
  cn_active_fund:
    dimension_weights_profile: cn_fund
