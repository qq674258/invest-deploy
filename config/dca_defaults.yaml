# 智能定投默认配置

dca:
  # 综合分中性点（S 高于此开始减投；略低于 50 使 S≈60–65 时少投更明显）
  s_mid: 50

  # S > s_mid 时减投曲线陡峭系数（>1 更保守）
  high_side_scale: 0.8

  # 高估侧最低投入比例（0.4 → P=500 时最低约 200）
  alpha_min: 0.8

  # 激进倍数选项（用户可选）
  multiplier_max_options: [1.5, 2.0]
  default_multiplier_max: 1.5

  # 相邻两次定投建议最大变化比例
  smooth_max_change: 0.3

  # 现金池：少投部分累积
  cash_pool:
    enabled: true
    apply_on_underinvest: true
    spend_on_overinvest_cap: true

  # 定投频率枚举（与 UI / API 一致）
  frequencies:
    DAILY:
      label: 每天
      cron_hint: 每个交易日
    WEEKLY:
      label: 每周
      weekday_default: 5  # 周五 (0=周一)
    BIWEEKLY:
      label: 双周
      anchor_required: true
    MONTHLY:
      label: 每月
      rule: nth_trading_day
      nth_default: 1
    BIMONTHLY:
      label: 每两月
      months_interval: 2

  # f(S) 映射说明（实现见 core/dca.py）
  # S >= s_mid: f = 1 - (1-alpha_min)*(S-s_mid)/(100-s_mid)
  # S <  s_mid: f = 1 + (M-1)*(s_mid-S)/s_mid
  # 最终 f = min(M, f(S) + 回撤加成 + 可选 VIX 加成)
  # amount = clip(round(P*f), P*alpha_min, P*M)

  # 距近期高点回撤加仓（方案一 score_only 不使用；保留供兼容）
  drawdown_boost:
    enabled: true
    lookback_days: 126
    min_depth: 0.02
    reference_depth: 0.15
    max_extra: 0.4

  # 方案二：日常 + 备用子弹（不参与综合分 S）
  # 每期计划 P：X% 固定日常定投，Y% 累积为子弹；回撤达 Z% 后按深度从池中加仓
  split_reserve:
    routine_pct: 0.70           # X：日常定投占比
    reserve_pct: 0.30           # Y：备用子弹占比（X+Y 建议 = 1）
    drawdown_trigger: 0.10      # Z：相对窗口高点至少跌 10% 才动用子弹
    full_deploy_depth: 0.20     # 跌满 20% 时本期打光子弹池
    lookback_days: 252          # 高点窗口（252≈52周）
    take_profit_pct: null      # 止盈 T%；null/0=不止盈；0.30=持仓收益达30%清仓等Z再入场

  # 波动率逆向微调（可选，不超过 M）
  vol_boost:
    enabled: true
    vix_threshold: 25
    max_extra_pct: 0.05
    only_when_s_below: 40

  # 仅在定投日生成正式建议
  official_suggestion_on_dca_day_only: true
  allow_preview_off_dca_day: true

# 用户组合示例（后期存 DB）
portfolio_example:
  name: 默认组合
  legs:
    - instrument_id: NDX
      planned_amount: 500
      frequency: WEEKLY
      multiplier_max: 1.5
    - instrument_id: SPX
      planned_amount: 300
      frequency: MONTHLY
      multiplier_max: 1.5
    - instrument_id: N225
      planned_amount: 200
      frequency: MONTHLY
      multiplier_max: 2.0
