# 回撤邮件告警默认配置（管理后台可覆盖，写入 data/alert_config.override.yaml）
# SMTP 密码也可通过环境变量 SMTP_PASSWORD 提供

email:
  enabled: false
  smtp_host: ""
  smtp_port: 465
  smtp_use_ssl: true
  smtp_user: ""
  smtp_password: ""
  from_addr: ""
  to_addrs: []

drawdown:
  enabled: false
  instrument_ids:
    - NDX
    - SPX
    - N225
    - DAX
  lookback_days: 252
  thresholds_pct: [5, 10, 15]
  recover_above_pct: 4
