# 指标目录 — 定义每个 metric 的来源、适用资产类、是否参与评分
# source_type: crawl | compute | hybrid（爬原始 + 库内算分位）
# participates_in_s: true | false（如申购状态仅作执行闸门）

metrics:
  # ─── 趋势 ─────────────────────────────────────────
  ma50:
    name: MA50
    dimension: trend
    source_type: compute
    formula: SMA(close, 50)
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true
    description: 50日均线，收盘价相对位置

  ma200:
    name: MA200
    dimension: trend
    source_type: compute
    formula: SMA(close, 200)
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true

  macd_hist:
    name: MACD柱
    dimension: trend
    source_type: compute
    formula: MACD(12,26,9).histogram
    asset_classes: [index_us, index_jp, index_de]
    participates_in_s: true

  price_vs_ma200:
    name: 价格/MA200
    dimension: trend
    source_type: compute
    formula: close / ma200 - 1
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true

  nav_ma60:
    name: 净值MA60
    dimension: trend
    source_type: compute
    formula: SMA(nav, 60)
    asset_classes: [cn_active_fund]
    participates_in_s: true

  nav_ma120:
    name: 净值MA120
    dimension: trend
    source_type: compute
    formula: SMA(nav, 120)
    asset_classes: [cn_active_fund]
    participates_in_s: true

  # ─── 动量 ─────────────────────────────────────────
  rsi14:
    name: RSI14
    dimension: momentum
    source_type: compute
    formula: RSI(close, 14)
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true
    note: 归一化时高RSI映射为更谨慎（超买）

  mom_12_1:
    name: 12-1月动量
    dimension: momentum
    source_type: compute
    formula: return_12m - return_1m
    asset_classes: [index_us, index_jp, index_de]
    participates_in_s: true

  ret_3m:
    name: 近3月收益
    dimension: momentum
    source_type: compute
    formula: nav或close 63交易日收益
    asset_classes: [cn_active_fund]
    participates_in_s: true

  ret_6m:
    name: 近6月收益
    dimension: momentum
    source_type: compute
    asset_classes: [cn_active_fund]
    participates_in_s: true

  excess_vs_benchmark_6m:
    name: 6月超额收益
    dimension: momentum
    source_type: compute
    formula: fund_ret_6m - benchmark_ret_6m
    asset_classes: [cn_active_fund]
    participates_in_s: true
    requires: [fund_nav, benchmark_ohlcv]

  # ─── 波动 / 情绪 ─────────────────────────────────
  vix:
    name: VIX恐慌指数
    dimension: vol
    source_type: crawl
    series_id: macro:vix
    provider: yfinance
    symbol: "^VIX"
    asset_classes: [index_us]
    participates_in_s: true
    note: 高VIX→波动维度偏谨慎；定投侧可逆向加仓（规则层）

  vdax:
    name: VDAX
    dimension: vol
    source_type: crawl
    series_id: macro:vdax
    provider: yfinance  # 或降级 atr_pct
    symbol: "^VDAX"     # 不可用见 instruments fallback
    asset_classes: [index_de]
    participates_in_s: true

  atr_pct:
    name: ATR百分比
    dimension: vol
    source_type: compute
    formula: ATR(14) / close
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true

  realized_vol_20d:
    name: 20日实现波动
    dimension: vol
    source_type: compute
    asset_classes: [index_jp, index_de, cn_active_fund]
    participates_in_s: true

  drawdown_52w:
    name: 距52周高点回撤
    dimension: vol
    source_type: compute
    formula: close / max_52w - 1
    asset_classes: [index_us, index_jp, index_de, cn_active_fund]
    participates_in_s: true
    note: 回撤越深，vol维度可映射为更「安全」侧（低S贡献）

  max_drawdown_1y:
    name: 1年最大回撤
    dimension: vol
    source_type: compute
    asset_classes: [cn_active_fund]
    participates_in_s: true

  # ─── 估值 ─────────────────────────────────────────
  pe_ttm:
    name: PE-TTM
    dimension: valuation
    source_type: crawl
    series_id: macro:pe_sp500
    provider: multpl
    asset_classes: [index_us]
    participates_in_s: true
    note: 历史 multpl 标普月度；最新 QQQ/SPY trailingPE 日频（采集 provider pe_ttm）

  pe_ttm_sp500:
    name: 标普PE-TTM
    dimension: valuation
    source_type: crawl
    asset_classes: [index_us]
    participates_in_s: true
    mvp_fallback: price_percentile_5y

  pe_ttm_percentile_5y:
    name: PE五年分位
    dimension: valuation
    source_type: hybrid
    formula: percentile(pe_ttm, 5y)
    asset_classes: [index_us, index_jp, index_de]
    participates_in_s: true

  price_percentile_5y:
    name: 价格五年分位
    dimension: valuation
    source_type: compute
    formula: percentile(close, 5y)
    asset_classes: [index_us, index_jp, index_de]
    participates_in_s: true
    note: MVP默认估值proxy

  pb:
    name: 市净率
    dimension: valuation
    source_type: crawl
    series_id: macro:pb_sp500
    provider: multpl
    asset_classes: [index_us]
    participates_in_s: true
    note: NDX 评分暂用标普 P/B 代理

  shiller_cape:
    name: 席勒CAPE
    dimension: valuation
    source_type: crawl
    series_id: macro:shiller_cape
    provider: multpl
    asset_classes: [index_us]
    participates_in_s: true

  erp_spread:
    name: 股债收益差
    dimension: valuation
    source_type: hybrid
    formula: earnings_yield - us10y
    asset_classes: [index_us]
    participates_in_s: true

  forward_pe_12m:
    name: 前瞻PE(12M)
    dimension: valuation
    source_type: crawl
    series_id: macro:forward_pe_qqq
    provider: yfinance
    asset_classes: [index_us]
    participates_in_s: true
    note: QQQ 快照，日频前向填充

  cnn_fear_greed:
    name: CNN恐惧贪婪
    dimension: sentiment
    source_type: crawl
    series_id: macro:cnn_fear_greed
    asset_classes: [index_us]
    participates_in_s: true

  put_call_ratio:
    name: PUT/CALL比率
    dimension: sentiment
    source_type: crawl
    provider: cboe
    asset_classes: [index_us]
    participates_in_s: true
    note: Cboe 每日 TOTAL Put/Call；NDX/SPX 分别存入 macro:ndx:put_call / macro:spx:put_call

  drawdown_6m_high:
    name: 距6月高点回撤
    dimension: drawdown
    source_type: compute
    formula: close / max_126d - 1
    asset_classes: [index_us]
    participates_in_s: true

  ndx_pct_above_ma200:
    name: 纳指成分>MA200占比
    dimension: breadth
    source_type: crawl
    series_id: macro:ndx:breadth_ma200
    asset_classes: [index_us]
    participates_in_s: true
    note: 仅 NDX 评分使用

  spx_pct_above_ma200:
    name: 标普成分>MA200占比
    dimension: breadth
    source_type: crawl
    series_id: macro:spx:breadth_ma200
    asset_classes: [index_us]
    participates_in_s: true
    note: 仅 SPX 评分使用

  yield_curve_2s10s:
    name: 2s10s美债利差
    dimension: macro
    source_type: crawl
    series_id: macro:yield_curve_2s10s
    provider: fred
    fred_series: T10Y2Y
    asset_classes: [index_us]
    participates_in_s: true

  fed_funds:
    name: 联邦基金利率
    dimension: macro
    source_type: crawl
    series_id: macro:fed_funds
    provider: fred
    fred_series: DFF
    asset_classes: [index_us]
    participates_in_s: true

  fed_balance_sheet:
    name: 美联储资产负债表
    dimension: macro
    source_type: crawl
    series_id: macro:fed_balance_sheet
    provider: fred
    fred_series: WALCL
    asset_classes: [index_us]
    participates_in_s: true

  ma50_ma200_cross:
    name: MA50/MA200金叉偏离
    dimension: trend
    source_type: compute
    formula: ma50/ma200 - 1
    asset_classes: [index_us]
    participates_in_s: true

  us2y:
    name: 美债2年期
    dimension: macro
    source_type: crawl
    series_id: macro:us2y
    provider: fred
    fred_series: DGS2
    asset_classes: [index_us]
    participates_in_s: false

  csi300_pe_percentile:
    name: 沪深300 PE分位
    dimension: env
    source_type: hybrid
    provider: tushare
    asset_classes: [cn_active_fund]
    participates_in_s: true
    note: 大环境，非单基金PE

  # ─── 宏观 ─────────────────────────────────────────
  us10y:
    name: 美债10年期
    dimension: macro
    source_type: crawl
    series_id: macro:us10y
    provider: fred
    fred_series: DGS10
    asset_classes: [index_us]
    participates_in_s: true

  real_rate_proxy:
    name: 实际利率近似
    dimension: macro
    source_type: hybrid
    formula: us10y - breakeven_or_cpi_proxy
    asset_classes: [index_us]
    participates_in_s: false  # 二期

  dxy:
    name: 美元指数
    dimension: macro
    source_type: crawl
    provider: fred
    fred_series: DTWEXBGS
    asset_classes: [index_us, index_jp, index_de]
    participates_in_s: true

  usdjpy:
    name: 美元日元
    dimension: macro
    source_type: crawl
    provider: yfinance
    symbol: "JPY=X"
    asset_classes: [index_jp]
    participates_in_s: true

  eurusd:
    name: 欧元美元
    dimension: macro
    source_type: crawl
    provider: yfinance
    symbol: "EURUSD=X"
    asset_classes: [index_de]
    participates_in_s: true

  # ─── 广度（可选）─────────────────────────────────
  pct_above_ma50:
    name: 成分股高于MA50占比
    dimension: breadth
    source_type: crawl
    asset_classes: [index_us]
    participates_in_s: false

  # ─── 基金质量 ─────────────────────────────────────
  sharpe_1y:
    name: 1年夏普
    dimension: quality
    source_type: compute
    asset_classes: [cn_active_fund]
    participates_in_s: true

  calmar_1y:
    name: 1年Calmar
    dimension: quality
    source_type: compute
    asset_classes: [cn_active_fund]
    participates_in_s: true

  # ─── 执行闸门（不参与S）──────────────────────────
  subscription_status:
    name: 申购状态
    dimension: execution
    source_type: crawl
    asset_classes: [cn_active_fund]
    participates_in_s: false

  daily_limit:
    name: 日申购限额
    dimension: execution
    source_type: crawl
    asset_classes: [cn_active_fund]
    participates_in_s: false

# 维度默认说明（分数越高=越谨慎/偏贵）
dimensions:
  trend: 趋势强度与方向风险
  momentum: 动量过热程度
  vol: 波动与恐慌
  valuation: 估值贵贱
  sentiment: 市场情绪与期权
  drawdown: 价格回撤
  macro: 利率与流动性环境
  breadth: 市场内部广度
  quality: 基金风险调整收益
  env: 国内市场大环境
  execution: 是否可申购（闸门）
