defaults:
  lookback_years: 1
  lookback_days_extra: 30
  scoring_lookback_years: 1
  crawl_retry: 3
  crawl_retry_interval_sec: 20
  breadth_symbol_sleep_sec: 0.35
  fund_nav_page_sleep_sec: 2
  price_jump_threshold: 0.15
  auto_crawl_enabled: true
  auto_crawl_time: 07:30
  auto_crawl_timezone: Asia/Shanghai
  auto_crawl_incremental: true
  auto_crawl_include_funds: true
  auto_crawl_run_alerts: true
endpoints:
  fred_observations: https://api.stlouisfed.org/fred/series/observations
  multpl_table_template: https://www.multpl.com/{slug}/table/by-month
  cboe_daily_stats: https://www.cboe.com/us/options/market_statistics/daily/
  cboe_totalpc_csv: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/totalpc.csv
  cboe_totalpc_archive: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/totalpcarchive.csv
  cboe_pc_ratio_archive: https://cdn.cboe.com/resources/options/volume_and_call_put_ratios/pcratioarchive.csv
  cnn_fear_greed: https://production.dataviz.cnn.io/index/fearandgreed/graphdata
  stooq_daily: https://stooq.pl/q/d/l/
  yahoo_chart_template: https://query1.finance.yahoo.com/v8/finance/chart/{symbol}
  eastmoney_fund_brief: https://fundmobapi.eastmoney.com/FundMNewApi/FundMNBriefInfos
  eastmoney_fund_pingzhong: https://fund.eastmoney.com/pingzhongdata/{fund_code}.js
  eastmoney_fund_nav: https://api.fund.eastmoney.com/f10/lsjz
  eastmoney_fund_manager_list: https://fundmobapi.eastmoney.com/FundMNewApi/FundMNMangerList
